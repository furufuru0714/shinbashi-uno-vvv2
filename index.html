<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>パチスロデータ管理システム</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #222;
      --muted: #666;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --border: #dbe3f0;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      width: min(1200px, calc(100% - 24px));
      margin: 0 auto;
      padding: 16px 0 32px;
    }

    .header {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: #fff;
      padding: 18px 16px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: 1.3rem;
    }

    .header p {
      margin: 0;
      font-size: 0.95rem;
      opacity: 0.95;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      border: 1px solid var(--border);
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 1.05rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.9rem;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 12px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      background: #fff;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-item {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .summary-item .label {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 6px;
    }

    .summary-item .value {
      font-size: 1.15rem;
      font-weight: 700;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
      background: #fff;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 1;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: #f9fbff;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .small-btn {
      padding: 8px 10px;
      font-size: 13px;
      border-radius: 8px;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .footer-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .header h1 {
        font-size: 1.15rem;
      }
    }

    @media (max-width: 480px) {
      .summary {
        grid-template-columns: 1fr;
      }

      input, button {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>パチスロデータ管理システム</h1>
      <p>機種情報・ゲーム数・各種数値を入力して保存できます。</p>
    </header>

    <section class="card">
      <h2 class="section-title">入力フォーム</h2>

      <form id="dataForm" autocomplete="off">
        <div class="form-grid">
          <div class="field">
            <label for="machineName">機種名</label>
            <input type="text" id="machineName" placeholder="例：L〇〇〇〇" />
          </div>

          <div class="field">
            <label for="machineNo">台番号</label>
            <input type="text" id="machineNo" placeholder="例：12" />
          </div>

          <div class="field">
            <label for="bonus">BONUS</label>
            <input type="number" id="bonus" min="0" step="1" placeholder="0" />
          </div>

          <div class="field">
            <label for="big">BIG</label>
            <input type="number" id="big" min="0" step="1" placeholder="0" />
          </div>

          <div class="field">
            <label for="reg">REG</label>
            <input type="number" id="reg" min="0" step="1" placeholder="0" />
          </div>

          <div class="field">
            <label for="atart">AT/ART</label>
            <input type="number" id="atart" min="0" step="1" placeholder="0" />
          </div>

          <div class="field">
            <label for="totalGames">累計ゲーム数</label>
            <input type="number" id="totalGames" min="0" step="1" placeholder="0" />
          </div>

          <div class="field">
            <label for="lastGames">最終ゲーム数</label>
            <input type="number" id="lastGames" min="0" step="1" placeholder="0" />
          </div>

          <div class="field">
            <label for="payout">払出枚数</label>
            <input type="number" id="payout" min="0" step="1" placeholder="0" />
          </div>

          <div class="field">
            <label for="bigRecord">BIG記録</label>
            <input type="number" id="bigRecord" min="0" step="1" placeholder="0" />
          </div>

          <div class="field full">
            <label for="memo">メモ</label>
            <input type="text" id="memo" placeholder="任意のメモを入力" />
          </div>
        </div>

        <div class="button-row">
          <button type="button" id="addBtn" class="btn-primary">追加する</button>
          <button type="button" id="clearBtn" class="btn-secondary">クリア</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h2 class="section-title">集計</h2>
      <div class="summary">
        <div class="summary-item">
          <div class="label">登録件数</div>
          <div class="value" id="countSummary">0</div>
        </div>
        <div class="summary-item">
          <div class="label">総BONUS</div>
          <div class="value" id="bonusSummary">0</div>
        </div>
        <div class="summary-item">
          <div class="label">総BIG</div>
          <div class="value" id="bigSummary">0</div>
        </div>
        <div class="summary-item">
          <div class="label">総REG</div>
          <div class="value" id="regSummary">0</div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">一覧</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>機種名</th>
              <th>台番号</th>
              <th>BONUS</th>
              <th>BIG</th>
              <th>REG</th>
              <th>AT/ART</th>
              <th>累計G</th>
              <th>最終G</th>
              <th>払出枚数</th>
              <th>BIG記録</th>
              <th>メモ</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="12" class="empty">まだデータがありません。</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="footer-note">
        ※ データはこのブラウザの localStorage に保存されます。
      </div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "pachislot_records_v1";

    const dataForm = document.getElementById("dataForm");
    const addBtn = document.getElementById("addBtn");
    const clearBtn = document.getElementById("clearBtn");
    const tableBody = document.getElementById("tableBody");

    const countSummary = document.getElementById("countSummary");
    const bonusSummary = document.getElementById("bonusSummary");
    const bigSummary = document.getElementById("bigSummary");
    const regSummary = document.getElementById("regSummary");

    const fields = {
      machineName: document.getElementById("machineName"),
      machineNo: document.getElementById("machineNo"),
      bonus: document.getElementById("bonus"),
      big: document.getElementById("big"),
      reg: document.getElementById("reg"),
      atart: document.getElementById("atart"),
      totalGames: document.getElementById("totalGames"),
      lastGames: document.getElementById("lastGames"),
      payout: document.getElementById("payout"),
      bigRecord: document.getElementById("bigRecord"),
      memo: document.getElementById("memo"),
    };

    let records = loadRecords();
    let editIndex = -1;

    function loadRecords() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return [];
      try {
        const parsed = JSON.parse(saved);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function getFormData() {
      return {
        machineName: fields.machineName.value.trim(),
        machineNo: fields.machineNo.value.trim(),
        bonus: Number(fields.bonus.value || 0),
        big: Number(fields.big.value || 0),
        reg: Number(fields.reg.value || 0),
        atart: Number(fields.atart.value || 0),
        totalGames: Number(fields.totalGames.value || 0),
        lastGames: Number(fields.lastGames.value || 0),
        payout: Number(fields.payout.value || 0),
        bigRecord: Number(fields.bigRecord.value || 0),
        memo: fields.memo.value.trim(),
        createdAt: new Date().toISOString()
      };
    }

    function setFormData(record) {
      fields.machineName.value = record.machineName || "";
      fields.machineNo.value = record.machineNo || "";
      fields.bonus.value = record.bonus ?? 0;
      fields.big.value = record.big ?? 0;
      fields.reg.value = record.reg ?? 0;
      fields.atart.value = record.atart ?? 0;
      fields.totalGames.value = record.totalGames ?? 0;
      fields.lastGames.value = record.lastGames ?? 0;
      fields.payout.value = record.payout ?? 0;
      fields.bigRecord.value = record.bigRecord ?? 0;
      fields.memo.value = record.memo || "";
    }

    function clearForm() {
      dataForm.reset();
      editIndex = -1;
      addBtn.textContent = "追加する";
      fields.machineName.focus();
    }

    function validateRecord(record) {
      if (!record.machineName) {
        alert("機種名を入力してください。");
        return false;
      }
      if (!record.machineNo) {
        alert("台番号を入力してください。");
        return false;
      }
      return true;
    }

    function addOrUpdateRow() {
      const record = getFormData();

      if (!validateRecord(record)) return;

      if (editIndex >= 0) {
        records[editIndex] = record;
      } else {
        records.unshift(record);
      }

      saveRecords();
      renderTable();
      renderSummary();
      clearForm();
    }

    function editRecord(index) {
      editIndex = index;
      setFormData(records[index]);
      addBtn.textContent = "更新する";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteRecord(index) {
      if (!confirm("このデータを削除しますか？")) return;
      records.splice(index, 1);
      saveRecords();
      renderTable();
      renderSummary();
      if (editIndex === index) clearForm();
    }

    function renderSummary() {
      countSummary.textContent = records.length;
      bonusSummary.textContent = records.reduce((sum, r) => sum + Number(r.bonus || 0), 0);
      bigSummary.textContent = records.reduce((sum, r) => sum + Number(r.big || 0), 0);
      regSummary.textContent = records.reduce((sum, r) => sum + Number(r.reg || 0), 0);
    }

    function renderTable() {
      if (!records.length) {
        tableBody.innerHTML = `<tr><td colspan="12" class="empty">まだデータがありません。</td></tr>`;
        return;
      }

      tableBody.innerHTML = records.map((record, index) => `
        <tr>
          <td>${escapeHtml(record.machineName)}</td>
          <td>${escapeHtml(record.machineNo)}</td>
          <td>${record.bonus}</td>
          <td>${record.big}</td>
          <td>${record.reg}</td>
          <td>${record.atart}</td>
          <td>${record.totalGames}</td>
          <td>${record.lastGames}</td>
          <td>${record.payout}</td>
          <td>${record.bigRecord}</td>
          <td>${escapeHtml(record.memo || "")}</td>
          <td>
            <div class="actions">
              <button type="button" class="small-btn btn-secondary" onclick="editRecord(${index})">編集</button>
              <button type="button" class="small-btn btn-danger" onclick="deleteRecord(${index})">削除</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    addBtn.addEventListener("click", (e) => {
      e.preventDefault();
      addOrUpdateRow();
    });

    clearBtn.addEventListener("click", (e) => {
      e.preventDefault();
      clearForm();
    });

    document.addEventListener("DOMContentLoaded", () => {
      renderTable();
      renderSummary();
    });

    // グローバルに公開（ボタンのonclickで使うため）
    window.editRecord = editRecord;
    window.deleteRecord = deleteRecord;
  </script>
</body>
</html>
